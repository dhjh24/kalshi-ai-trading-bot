services:
  bridge:
    image: python:3.12-slim
    working_dir: /app
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      sh -c "pip install -r requirements.txt &&
      python -m uvicorn python_bridge.app.main:app --host 0.0.0.0 --port 8101"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8101/health')"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "${DASHBOARD_BRIDGE_PORT:-8101}:8101"

  server:
    image: node:24
    working_dir: /app
    env_file:
      - .env
    environment:
      ANALYSIS_BRIDGE_URL: http://bridge:8101
      DASHBOARD_SERVER_HOST: 0.0.0.0
      DASHBOARD_SERVER_PORT: "4000"
    volumes:
      - .:/app
    command: >
      sh -c "npm install &&
      npm run build --workspace server &&
      npm run start --workspace server"
    depends_on:
      bridge:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 120s
    ports:
      - "${DASHBOARD_SERVER_PORT:-4000}:4000"

  web:
    image: node:24
    working_dir: /app
    env_file:
      - .env
    environment:
      # Browser uses localhost; container build/SSR uses Docker service DNS
      NEXT_PUBLIC_DASHBOARD_API_URL: http://127.0.0.1:${DASHBOARD_SERVER_PORT:-4000}
      DASHBOARD_API_INTERNAL_URL: http://server:4000
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    volumes:
      - .:/app
    command: >
      sh -c "npm install &&
      npm run build --workspace web &&
      npm run start --workspace web"
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${DASHBOARD_WEB_PORT:-3000}:3000"
