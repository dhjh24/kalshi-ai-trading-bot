services:
  bridge:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -r requirements.txt &&
      python -m uvicorn python_bridge.app.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  server:
    image: node:24
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "npm install &&
      npm run start --workspace server"
    environment:
      ANALYSIS_BRIDGE_URL: http://bridge:8001
      DASHBOARD_SERVER_HOST: 0.0.0.0
    depends_on:
      - bridge
    ports:
      - "4000:4000"

  web:
    image: node:24
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "npm install &&
      NEXT_PUBLIC_DASHBOARD_API_URL=http://server:4000
      npm run start --workspace web"
    depends_on:
      - server
    ports:
      - "3000:3000"
